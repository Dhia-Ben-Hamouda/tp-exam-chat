<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevChat — Mini Chat en Temps Réel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;700;800&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0d0f;
      --surface: #111518;
      --border: #1e2529;
      --accent: #00e5a0;
      --accent2: #00b8ff;
      --muted: #3a4550;
      --text: #d4dde6;
      --text-dim: #6b7f8e;
      --danger: #ff4d6d;
      --radius: 6px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 229, 160, 0.07) 0%, transparent 60%);
    }

    /* ── APP WRAPPER ── */
    .app {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0, 229, 160, 0.04), 0 20px 60px rgba(0, 0, 0, 0.6);
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dot-row {
      display: flex;
      gap: 7px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .dot.r {
      background: #ff5f57;
    }

    .dot.y {
      background: #febc2e;
    }

    .dot.g {
      background: #28c840;
    }

    .header-title {
      flex: 1;
      text-align: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      background: var(--surface);
      padding: 56px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .login-icon {
      width: 64px;
      height: 64px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      box-shadow: 0 0 30px rgba(0, 229, 160, 0.2);
    }

    .login-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      text-align: center;
    }

    .login-subtitle {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-align: center;
      margin-top: -24px;
    }

    .login-form {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── INPUTS ── */
    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 229, 160, 0.12);
    }

    input[type="text"]::placeholder {
      color: var(--muted);
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-primary:hover {
      background: #00ffb3;
      box-shadow: 0 0 20px rgba(0, 229, 160, 0.4);
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    .btn-send {
      background: var(--accent);
      color: var(--bg);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 0 20px;
      flex-shrink: 0;
    }

    .btn-send:hover {
      background: #00ffb3;
      box-shadow: 0 0 16px rgba(0, 229, 160, 0.35);
    }

    .btn-send:active {
      transform: scale(0.97);
    }

    /* ── CHAT SCREEN ── */
    #chat-screen {
      display: none;
      flex-direction: column;
    }

    .user-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.78rem;
    }

    .user-tag {
      color: var(--text-dim);
    }

    .user-name {
      color: var(--accent);
      font-weight: 700;
    }

    .refresh-info {
      font-size: 0.7rem;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .refresh-spinner {
      width: 10px;
      height: 10px;
      border: 1.5px solid var(--muted);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 1.5s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── MESSAGES AREA ── */
    #messages {
      background: var(--bg);
      min-height: 380px;
      max-height: 55vh;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar {
      width: 4px;
    }

    #messages::-webkit-scrollbar-track {
      background: transparent;
    }

    #messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px 12px;
      border-radius: var(--radius);
      transition: background 0.15s;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .msg-mine {
      align-self: flex-end;
      align-items: flex-end;
      background: rgba(0, 229, 160, 0.05);
      border: 1px solid rgba(0, 229, 160, 0.12);
    }

    .msg-other {
      align-self: flex-start;
      align-items: flex-start;
    }

    .msg-system {
      align-self: center;
      align-items: center;
    }

    .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .msg-author {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent2);
    }

    .msg-mine .msg-author {
      color: var(--accent);
    }

    .msg-system .msg-author {
      color: var(--text-dim);
    }

    .msg-time {
      font-size: 0.65rem;
      color: var(--muted);
    }

    .msg-content {
      font-size: 0.83rem;
      color: var(--text);
      line-height: 1.5;
      word-break: break-word;
    }

    .msg-system .msg-content {
      color: var(--text-dim);
      font-size: 0.75rem;
      font-style: italic;
    }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.78rem;
      gap: 8px;
    }

    /* ── INPUT BAR ── */
    .input-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      gap: 0;
    }

    .input-bar input {
      flex: 1;
      border-radius: var(--radius) 0 0 var(--radius);
      border-right: none;
    }

    /* ── ERROR ── */
    .error-msg {
      font-size: 0.72rem;
      color: var(--danger);
      padding: 4px 0 0 4px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      body {
        padding: 0;
      }

      .app {
        border-radius: 0;
        border-left: none;
        border-right: none;
        min-height: 100vh;
      }

      #login-screen {
        padding: 40px 24px;
      }

      #messages {
        max-height: 60vh;
      }
    }
  </style>
</head>

<body>

  <div class="app">

    <!-- SHARED HEADER -->
    <header>
      <div class="dot-row">
        <span class="dot r"></span>
        <span class="dot y"></span>
        <span class="dot g"></span>
      </div>
      <span class="header-title">DevChat</span>
      <div class="status-pill">
        <span class="status-dot"></span>
        <span>live</span>
      </div>
    </header>

    <!-- LOGIN SCREEN -->
    <section id="login-screen">
      <div class="login-icon">💬</div>
      <div>
        <h1 class="login-title">Rejoindre le chat</h1>
        <p class="login-subtitle">Choisissez un pseudo pour commencer</p>
      </div>
      <div class="login-form">
        <input id="pseudo-input" type="text" placeholder="votre_pseudo" maxlength="30" autocomplete="off" />
        <div id="login-error" class="error-msg"></div>
        <button class="btn btn-primary" onclick="joinChat()">→ Rejoindre</button>
      </div>
    </section>

    <!-- CHAT SCREEN -->
    <section id="chat-screen">
      <div class="user-bar">
        <div class="user-info">
          <span class="user-tag">connecté en tant que</span>
          <span id="display-name" class="user-name"></span>
        </div>
        <div class="refresh-info">
          <span class="refresh-spinner"></span>
          <span>auto-refresh 3s</span>
        </div>
      </div>

      <div id="messages">
        <div class="empty-state" id="empty-state">⬜ Aucun message pour l'instant…</div>
      </div>

      <div class="input-bar">
        <input id="msg-input" type="text" placeholder="Tapez votre message…" maxlength="500" autocomplete="off"
          onkeydown="if(event.key==='Enter') sendMessage()" />
        <button class="btn btn-send" onclick="sendMessage()">Envoyer ↵</button>
      </div>
    </section>

  </div>

  <script>
    const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:3000'
      : '';   // same origin in production (nginx proxy)

    let currentUser = '';
    let lastCount = 0;
    let refreshTimer = null;

    /* ── JOIN ── */
    function joinChat() {
      const val = document.getElementById('pseudo-input').value.trim();
      if (!val) {
        document.getElementById('login-error').textContent = '⚠ Le pseudo ne peut pas être vide.';
        return;
      }
      currentUser = val;
      document.getElementById('display-name').textContent = currentUser;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('chat-screen').style.display = 'flex';
      document.getElementById('chat-screen').style.flexDirection = 'column';
      fetchMessages(true);
      refreshTimer = setInterval(() => fetchMessages(false), 3000);
      document.getElementById('msg-input').focus();
    }

    async function fetchMessages(scrollToBottom = false) {
      try {
        const res = await fetch(`${API}/api/messages`);
        if (!res.ok) throw new Error();
        const data = await res.json();

        // Handle both a raw array and a wrapped { messages: [] } shape
        const msgs = Array.isArray(data) ? data : (data.messages ?? []);

        if (msgs.length !== lastCount || scrollToBottom) {
          lastCount = msgs.length;
          renderMessages(msgs);
          if (scrollToBottom || msgs.length > 0) scrollDown();
        }
      } catch {
        // silently ignore network errors during polling
      }
    }

    /* ── RENDER ── */
    function renderMessages(msgs) {
      const container = document.getElementById('messages');
      const empty = document.getElementById('empty-state');

      if (msgs.length === 0) {
        empty.style.display = 'flex';
        // remove all msg nodes
        [...container.querySelectorAll('.msg')].forEach(el => el.remove());
        return;
      }
      empty.style.display = 'none';

      // Build new set
      container.innerHTML = '';
      msgs.forEach(msg => {
        const el = document.createElement('div');
        const isSystem = msg.author === 'System';
        const isMine = msg.author === currentUser;
        el.className = 'msg' + (isSystem ? ' msg-system' : isMine ? ' msg-mine' : ' msg-other');

        const time = formatTime(msg.timestamp);
        el.innerHTML = `
        <div class="msg-meta">
          <span class="msg-author">${escapeHtml(msg.author)}</span>
          <span class="msg-time">${time}</span>
        </div>
        <div class="msg-content">${escapeHtml(msg.content)}</div>
      `;
        container.appendChild(el);
      });
    }

    /* ── SEND ── */
    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const content = input.value.trim();
      if (!content) return;

      input.value = '';
      input.disabled = true;

      try {
        const res = await fetch(`${API}/api/messages`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ author: currentUser, content })
        });
        if (res.ok) {
          await fetchMessages(true);
        }
      } catch {
        input.value = content; // restore on failure
      } finally {
        input.disabled = false;
        input.focus();
      }
    }

    /* ── UTILS ── */
    function scrollDown() {
      const el = document.getElementById('messages');
      el.scrollTop = el.scrollHeight;
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Allow Enter on login screen
    document.getElementById('pseudo-input')
      .addEventListener('keydown', e => { if (e.key === 'Enter') joinChat(); });
  </script>
</body>

</html>
