name: CI — Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-test:
    name: Backend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Install dependencies
        run: npm install

      - name: Check server starts
        run: |
          node server.js &
          sleep 2
          curl -f http://localhost:3000/api/messages
          kill %1

  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t chat-backend ./backend

      - name: Build frontend image
        run: docker build -t chat-frontend ./frontend

      - name: Test docker-compose
        run: |
          docker compose up -d
          sleep 5
          curl -f http://localhost:3000/api/messages
          docker compose down